openapi: 3.0.3
info:
  title: ARCA Invoicing API
  version: 1.0.0
  description: >
    APIs para emitir Factura C en ARCA (ex AFIP) usando Afip SDK.
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  headers:
    X-Correlation-Id:
      description: Correlation id para trazabilidad
      schema: { type: string }
  schemas:
    InvoiceStatus:
      type: string
      enum: [Draft, Issuing, Issued, Failed]
    CreateInvoiceRequest:
      type: object
      required: [monto, concept, pointOfSale]
      properties:
        externalId: { type: string, nullable: true, description: "Idempotencia" }
        monto: { type: number, minimum: 0.01 }
        dni: { type: integer, minimum: 1000000, maximum: 99999999, nullable: true }
        cuit: { type: integer, minimum: 10000000000, maximum: 99999999999, nullable: true }
        concept:
          type: integer
          enum: [1,2]
        serviceFrom:
          type: string
          format: date
          description: "Fecha desde (YYYY-MM-DD). Requerido si concept=2"
        serviceTo:
          type: string
          format: date
          description: "Fecha hasta (YYYY-MM-DD). Requerido si concept=2"
        pointOfSale:
          type: integer
          minimum: 1
          description: "Punto de venta (parametrizado)"
    CreateInvoiceResponse:
      type: object
      properties:
        id: { type: string }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        cae: { type: string, nullable: true }
        caeVto: { type: string, nullable: true }
        voucherNumber: { type: integer, nullable: true }
    GetInvoiceResponse:
      type: object
      properties:
        id: { type: string }
        externalId: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/InvoiceStatus' }
        pointOfSale: { type: integer }
        voucherType: { type: integer }
        concept: { type: integer, enum: [1, 2] }
        documentType: { type: integer }
        documentNumber: { type: integer }
        date: { type: string, format: date }
        amount: { type: number }
        currency: { type: string }
        serviceFrom: { type: string, format: date, nullable: true }
        serviceTo: { type: string, format: date, nullable: true }
        cae: { type: string, nullable: true }
        caeVto: { type: string, nullable: true }
        voucherNumber: { type: integer, nullable: true }
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: Healthcheck
      responses:
        "200": { description: OK }

  /invoices:
    post:
      summary: Emitir Factura C
      description: Emite Factura C (CbteTipo=11), IVA 0. Si no se envía DNI, se usa Consumidor Final (DocTipo=99/DocNro=0).
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          schema: { type: string }
          required: false
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateInvoiceRequest' }
      responses:
        "201":
          description: Creada
          headers:
            X-Correlation-Id: { $ref: '#/components/headers/X-Correlation-Id' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreateInvoiceResponse' }
        "400": { description: Error de validación }
        "401": { description: Unauthorized }

  /invoices/{id}:
    get:
      summary: Obtener factura
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GetInvoiceResponse' }
        "404":
          description: No encontrada

  /afip/status:
    get:
      summary: Estado del servidor ARCA/AFIP
      security:
        - bearerAuth: []
      responses:
        "200": { description: OK }

  /sales-points:
    get:
      summary: Listar puntos de venta (stub)
      description: TODO integrar FEParamGetPtosVenta vía SDK.
      security:
        - bearerAuth: []
      responses:
        "501": { description: Not Implemented }
